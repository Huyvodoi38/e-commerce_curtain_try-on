# Backend API — deploy free tại https://render.com (New > Blueprint)
# FE deploy riêng trên Vercel — xem docs/DEPLOY_VERCEL.md

services:
  - type: web
    name: curtain-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: Curtain_AI_TryOn
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ALLOW_ALL
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: BEANIE_ALLOW_INDEX_DROPPING
        value: "false"
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET
        sync: false
      - key: VNPAY_PAY_URL
        value: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - key: VNPAY_BANK_CODE
        value: VNPAYQR
      - key: VNPAY_EXPIRE_MINUTES
        value: "15"
      - key: VNPAY_IPN_URL
        sync: false
      - key: VNPAY_RETURN_URL_TEMPLATE
        sync: false
